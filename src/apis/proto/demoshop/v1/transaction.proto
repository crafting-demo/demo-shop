syntax = "proto3";

package demoshop.v1;

import "google/protobuf/timestamp.proto";

option go_package = "demoshop/gen/proto/demoshop/v1;demoshopv1";

// =============================================================================
// Core Message Types
// =============================================================================

// Product represents an item in the inventory
message Product {
  // State of a product in the inventory
  enum State {
    UNSPECIFIED = 0;
    AVAILABLE = 1;
    OFF_SHELF = 2;
  }

  string id = 1;
  string name = 2;
  string description = 3;
  bytes image_data = 4;
  int64 price_per_unit = 5; // Price in smallest currency unit (e.g., cents)
  int32 count_in_stock = 6;
  State state = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// CartItem represents a product in a cart with quantity
message CartItem {
  // The product snapshot added to the cart.
  Product product = 1;
  int32 quantity = 2;
}

// Cart represents a shopping cart
message Cart {
  string id = 1;
  repeated CartItem items = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

// OrderItem represents a product in an order at time of purchase
message OrderItem {
  // The product snapshot in the order.
  Product product = 1;
  int32 quantity = 2;
  int64 price_at_purchase = 3; // Price at time of order creation
}

// Order represents a customer order
message Order {
  // State of an order
  // Valid state transitions:
  //   PROCESSING -> SHIPPED -> COMPLETED
  //   PROCESSING -> CANCELED
  //   SHIPPED -> CANCELED
  enum State {
    UNSPECIFIED = 0;
    PROCESSING = 1;
    SHIPPED = 2;
    COMPLETED = 3;
    CANCELED = 4;
  }

  string id = 1;
  repeated OrderItem items = 2;
  int64 total_amount = 3;
  State state = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  string customer_name = 7;
  string customer_email = 8;
  string shipping_address = 9;
}

// =============================================================================
// Pagination
// =============================================================================

message PageInfo {
  bool has_next_page = 1;
  bool has_previous_page = 2;
  string start_cursor = 3;
  string end_cursor = 4;
}

message PaginationRequest {
  int32 first = 1;  // Number of items to fetch
  string after = 2; // Cursor for forward pagination
}

// =============================================================================
// Inventory Service
// =============================================================================

// Request/Response messages for Inventory Service

message QueryProductsRequest {
  PaginationRequest pagination = 1;
  Product.State state_filter = 2; // Optional filter by product state
  string search_name = 3; // Optional search by name (case-insensitive partial match)
}

message QueryProductsResponse {
  repeated Product products = 1;
  PageInfo page_info = 2;
  int32 total_count = 3;
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  bytes image_data = 3;
  int64 price_per_unit = 4;
  int32 count_in_stock = 5;
  Product.State state = 6;
}

message CreateProductResponse {
  Product product = 1;
}

message UpdateProductRequest {
  string id = 1;

  message NameUpdate {
    string value = 1;
  }
  message DescriptionUpdate {
    string value = 1;
  }
  message ImageDataUpdate {
    bytes value = 1;
  }
  message PricePerUnitUpdate {
    int64 value = 1;
  }
  message CountInStockUpdate {
    int32 value = 1;
  }
  message StateUpdate {
    Product.State value = 1;
  }

  NameUpdate name = 2;
  DescriptionUpdate description = 3;
  ImageDataUpdate image_data = 4;
  PricePerUnitUpdate price_per_unit = 5;
  CountInStockUpdate count_in_stock = 6;
  StateUpdate state = 7;
}

message UpdateProductResponse {
  Product product = 1;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
}

// =============================================================================
// Cart Service
// =============================================================================

// Request/Response messages for Cart Service

message GetCartRequest {
  string cart_id = 1;
}

message GetCartResponse {
  Cart cart = 1;
}

message AddProductToCartRequest {
  string cart_id = 1;
  string product_id = 2;
  int32 quantity = 3;
}

message AddProductToCartResponse {
  Cart cart = 1;
}

message UpdateProductInCartRequest {
  string cart_id = 1;
  string product_id = 2;
  int32 quantity = 3; // Set to 0 to remove the product from cart
}

message UpdateProductInCartResponse {
  Cart cart = 1;
}

message ClearCartRequest {
  string cart_id = 1;
}

message ClearCartResponse {
}

// =============================================================================
// Order Service
// =============================================================================

// Request/Response messages for Order Service

message CreateOrderRequest {
  string cart_id = 1; // Create order from cart contents
  string customer_name = 2;
  string customer_email = 3;
  string shipping_address = 4;
}

message CreateOrderResponse {
  Order order = 1;
}

message QueryOrdersRequest {
  PaginationRequest pagination = 1;

  message StateFilter {
    Order.State value = 1;
  }

  StateFilter state_filter = 2; // Optional filter by order state
  string customer_email = 3; // Optional filter by customer email
}

message QueryOrdersResponse {
  repeated Order orders = 1;
  PageInfo page_info = 2;
  int32 total_count = 3;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message UpdateOrderRequest {
  string id = 1;
  Order.State state = 2;
}

message UpdateOrderResponse {
  Order order = 1;
}

// =============================================================================
// Service Definitions
// =============================================================================

// InventoryService manages product inventory
service InventoryService {
  // Query products with pagination and optional filtering
  rpc QueryProducts(QueryProductsRequest) returns (QueryProductsResponse);
  
  // Get a single product by ID
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  
  // Create a new product
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  
  // Update an existing product
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  
  // Delete a product
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}

// CartService manages shopping carts
service CartService {
  // Get cart by ID
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  
  // Add a product to cart
  rpc AddProductToCart(AddProductToCartRequest) returns (AddProductToCartResponse);
  
  // Update product quantity in cart (set to 0 to remove)
  rpc UpdateProductInCart(UpdateProductInCartRequest) returns (UpdateProductInCartResponse);
  
  // Clear all items from cart
  rpc ClearCart(ClearCartRequest) returns (ClearCartResponse);
}

// OrderService manages customer orders
service OrderService {
  // Create a new order from cart contents
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  
  // Query orders with pagination and optional filtering
  rpc QueryOrders(QueryOrdersRequest) returns (QueryOrdersResponse);
  
  // Get a single order by ID
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  
  // Update order state
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
}
